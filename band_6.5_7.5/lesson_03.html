    function populateNavMenu() {

    };

    function renderSlide(index) {
        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        // Update header classes and content dynamically based on section theme
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        // Highlight Nav menu
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-amber-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-amber-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        // Inject content
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
        }, 10);

        // Update buttons
        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ?

        if(container) {
            container.classList.toggle('show-answers');
            if(container.classList.contains('show-answers')) {
                container.classList.add('bg-emerald-50/30', 'border-emerald-200');
            } else {
                container.classList.remove('bg-emerald-50/30', 'border-emerald-200');
            }
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answers' : 'Show Answers';

                btn.classList.toggle('bg-emerald-100');
                btn.classList.toggle('text-gray-700');
                btn.classList.toggle('text-emerald-800');
                btn.classList.toggle('border-gray-300');
                btn.classList.toggle('border-emerald-300');
            }
        }
    }

        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
