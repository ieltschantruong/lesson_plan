                                    <a href="https://ieltschantruong.github.io/IELTS/learning_resources/reading/mock_test/passage1_measures_combat_disease_russia.html" target="_blank" class="inline-flex items-center gap-1.5 text-red-600 hover:text-red-700 transition-colors px-3 py-1.5 bg-red-50 hover:bg-red-100 rounded-lg shadow-sm border border-red-200 text-sm font-bold" title="Open in new tab">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                        Open in New Tab
                                    </a>
                                </div>
                                <p class="text-gray-600 text-sm">Have the class complete this reading passage under exam conditions.</p>
                            </div>
                            
                            <div class="w-full flex-grow rounded-2xl overflow-hidden border border-gray-200 shadow-inner bg-gray-50 relative mb-4">
                                <iframe src="https://ieltschantruong.github.io/IELTS/learning_resources/reading/mock_test/passage1_measures_combat_disease_russia.html" class="absolute inset-0 w-full h-full border-0" title="Measures to Combat Disease"></iframe>
                            </div>

                            <div class="border-t border-gray-100 pt-3 shrink-0">
                                <button onclick="toggleVisibility('reading-answers-explain')" class="inline-flex items-center gap-2 bg-gray-50 text-gray-700 px-5 py-2.5 rounded-lg text-sm font-bold border border-gray-200 hover:bg-gray-100 transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Show Teacher Notes
                                </button>
                                
                                <div id="reading-answers-explain" class="hidden mt-4 bg-red-50 border border-red-100 rounded-xl p-5 text-sm text-gray-700">
                                    <h4 class="font-bold text-red-800 mb-2">Teacher Review Notes:</h4>
                                    <ul class="space-y-2 list-disc list-inside">
                                        <li>Identify and explain the trickiest <strong>True/False/Not Given</strong> statements.</li>
                                        <li>Highlight how <strong>"Combat Disease"</strong> is paraphrased throughout the text.</li>
                                        <li>Review time-management: ask students how many questions they finished within the 20 minutes.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="w-full lg:w-72 glass rounded-3xl p-6 border border-red-100 shadow-sm text-center relative overflow-hidden flex flex-col justify-center shrink-0 lg:h-full">
                            <div class="absolute inset-0 bg-gradient-to-b from-red-50/50 to-transparent"></div>
                            <div class="relative z-10">
                                <h4 class="text-red-500 font-bold uppercase tracking-widest text-xs mb-4">Exam Timer</h4>
                                <div class="text-5xl font-black text-red-600 tracking-tighter timer-text mb-6 drop-shadow-sm" id="reading20-timer">20:00</div>
                                
                                <div class="flex gap-2 w-full">
                                    <button onclick="toggleTimer('reading20', 1200)" id="btn-reading20-timer" class="flex-1 bg-gradient-to-r from-red-500 to-rose-500 text-white py-2.5 rounded-xl font-bold text-sm hover:from-red-600 hover:to-rose-600 shadow-sm transition-all">Start 20m</button>
                                    <button onclick="resetTimer('reading20', 1200)" class="px-3 bg-white border border-red-200 text-red-500 rounded-xl hover:bg-red-50 transition-colors shadow-sm">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `
        }
    ];

    let currentIndex = 0;
    
    let timers = {
        vocab: { interval: null, remaining: 900, isRunning: false },
        reading20: { interval: null, remaining: 1200, isRunning: false }
    };

    const headerEl = document.getElementById('app-header');
    const titleEl = document.getElementById('slide-title');
    const containerEl = document.getElementById('content-container');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const indicatorEl = document.getElementById('step-indicator');
    const progressBarEl = document.getElementById('progress-bar');
    const navDropdown = document.getElementById('nav-dropdown');
    const navMenuList = document.getElementById('nav-menu-list');

    function populateNavMenu() {
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-white shadow-sm ${data.themeClass}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title.substring(3)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor}">${data.type}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        navDropdown.classList.add('hidden');
    };

    document.getElementById('nav-toggle-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        navDropdown.classList.toggle('hidden');
    });

    document.addEventListener('click', (e) => {
        if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
            navDropdown.classList.add('hidden');
        }
    });

    function renderSlide(index) {
        pauseAllTimers();

        const data = sessionData[index];
        
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        progressBarEl.style.width = `${progressPercent}%`;
        indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-rose-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-rose-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
            
            if(data.id === 'vocab_exercises') updateTimerUI('vocab', timers.vocab.remaining);
            if(data.id === 'reading_practice') updateTimerUI('reading20', timers.reading20.remaining);
        }, 10);

        prevBtn.disabled = index === 0;
        nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) renderSlide(--currentIndex);
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < sessionData.length - 1) {
            renderSlide(++currentIndex);
        } else {
            alert("Lesson 10 Completed! Excellent work today.");
        }
    });

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimerUI(id, seconds) {
        const displayEl = document.getElementById(`${id}-timer`);
        if (displayEl) displayEl.textContent = formatTime(seconds);
    }

    function toggleTimer(id, defaultTime) {
        const timer = timers[id];
        const btn = document.getElementById(`btn-${id}-timer`);
        
        if (timer.isRunning) {
            clearInterval(timer.interval);
            timer.isRunning = false;
            if(btn) btn.textContent = 'Resume';
        } else {
            if (timer.remaining <= 0) timer.remaining = defaultTime;
            
            timer.isRunning = true;
            if(btn) btn.textContent = 'Pause';
            
            timer.interval = setInterval(() => {
                timer.remaining--;
                updateTimerUI(id, timer.remaining);
                
                if (timer.remaining <= 0) {
                    clearInterval(timer.interval);
                    timer.isRunning = false;
                    if(btn) btn.textContent = 'Time Up!';
                    playAlertSound();
                }
            }, 1000);
        }
    }

    function resetTimer(id, defaultTime) {
        const timer = timers[id];
        clearInterval(timer.interval);
        timer.isRunning = false;
        timer.remaining = defaultTime;
        updateTimerUI(id, defaultTime);
        const btn = document.getElementById(`btn-${id}-timer`);
        if(btn) {
            btn.textContent = id === 'reading20' ? 'Start 20m' : 'Start 15m';
        }
    }

    function pauseAllTimers() {
        Object.keys(timers).forEach(key => {
            if (timers[key].isRunning) {
                clearInterval(timers[key].interval);
                timers[key].isRunning = false;
            }
        });
    }

    function playAlertSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playBeep = (startTime) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(850, startTime);
                gain.gain.setValueAtTime(0.15, startTime);
                osc.start(startTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, startTime + 0.4);
                osc.stop(startTime + 0.4);
            };
            playBeep(ctx.currentTime);
            playBeep(ctx.currentTime + 0.5);
        } catch(e) { console.log('Audio alert fallback'); }
    }

    window.addEventListener('DOMContentLoaded', () => {
        populateNavMenu();
        renderSlide(0);
    });
</script>
</body>
</html>
