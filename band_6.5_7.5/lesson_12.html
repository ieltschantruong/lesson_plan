                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            Show Answers
                        </button>
                    </div>

                    <div id="ans-sb-4-read" class="hidden mb-6 bg-slate-50 border border-blue-200 rounded-2xl p-6 shrink-0 shadow-sm transition-all fade-in">
                        <h4 class="font-bold text-blue-800 mb-4 flex items-center gap-2 border-b border-blue-100 pb-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Teacher Reference: Answer Key
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 text-sm text-gray-700 font-medium">
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">1</span> storage (space)</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">2</span> invention</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">3</span> colour and design</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">4</span> (greasy) crayon</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">5</span> transfer paper</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">6</span> words and images</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">7</span> mass communication</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">8</span> exhibition</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">9</span> (unique) cultural institutions</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">10</span> False</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">11</span> True</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">12</span> True</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex items-center"><span class="w-6 h-6 rounded-md bg-blue-100 text-blue-700 flex items-center justify-center font-bold mr-3 shrink-0">13</span> Not Given</div>

                    <div class="w-full rounded-2xl overflow-hidden border border-gray-200 shadow-inner bg-gray-50 relative h-[800px]">
                        <iframe src="https://ieltschantruong.github.io/IELTS/learning_resources/reading/mock_test/passage1_complete_ielts_6.5_7.5_sb_unit4.html" class="absolute inset-0 w-full h-full border-0" title="Reading Practice"></iframe>

        }
    ];

    // Navigation and Logic Handlers
    let currentIndex = 0;

    const headerEl = document.getElementById('app-header');
    const titleEl = document.getElementById('slide-title');
    const containerEl = document.getElementById('content-container');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const indicatorEl = document.getElementById('step-indicator');
    const progressBarEl = document.getElementById('progress-bar');
    const navDropdown = document.getElementById('nav-dropdown');
    const navMenuList = document.getElementById('nav-menu-list');

    window.addEventListener('DOMContentLoaded', () => {
        populateNavMenu();
        
        // Toggle menu
        document.getElementById('nav-toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            navDropdown.classList.toggle('hidden');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
                navDropdown.classList.add('hidden');
            }
        });

        // Navigation handlers
        if(prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) renderSlide(--currentIndex);
            });
        }

        if(nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentIndex < sessionData.length - 1) {
                    renderSlide(++currentIndex);
                } else {
                    alert("Lesson 12 Completed! Excellent work today.");
                }
            });
        }

        renderSlide(0);
    });

    function populateNavMenu() {
        if(!navMenuList) return;
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-white shadow-sm ${data.themeClass || ''}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title ? data.title.substring(3) : 'Section ' + (index + 1)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor || ''}">${data.type || 'Lesson'}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        if(navDropdown) navDropdown.classList.add('hidden');
    };

    function renderSlide(index) {
        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        // Update header classes and content dynamically based on section theme
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        // Highlight Nav menu
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-blue-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-blue-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        // Inject content
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
        }, 10);

        // Update buttons
        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    // Toggle logic for inline answers and panels
    window.toggleInlineAnswers = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            container.classList.toggle('show-answers');
            if(container.classList.contains('show-answers')) {
                container.classList.add('bg-emerald-50/30', 'border-emerald-200');
            } else {
                container.classList.remove('bg-emerald-50/30', 'border-emerald-200');
            }
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answers' : 'Show Answers';
                btn.classList.toggle('bg-white');
                btn.classList.toggle('bg-emerald-100');
                btn.classList.toggle('text-gray-700');
                btn.classList.toggle('text-emerald-800');
                btn.classList.toggle('border-gray-300');
                btn.classList.toggle('border-emerald-300');
            }
        }
    }

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };
</script>
