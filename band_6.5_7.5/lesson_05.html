                                    <p>c. to happen in a particular way <span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200 ml-2">➜ turn out</span></p>
                                    <p>d. to make something smaller and clearer by removing less important things <span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200 ml-2">➜ narrow down</span></p>
                                    <p>e. to find the answer by thinking about it <span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200 ml-2">➜ work out</span></p>
                                    <p>f. to tell someone a fact that they did not already know <span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200 ml-2">➜ point out</span></p>
                                    <p>g. to reach a particular state or situation <span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200 ml-2">➜ come to</span></p>
                                    <p>h. to think of or suggest a plan, idea, solution or answer to a question <span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200 ml-2">➜ come up with</span></p>
                                </div>

                                <p class="text-gray-600 text-sm mb-4 font-medium border-t border-rose-100 pt-4">Fill in each blank with a suitable phrasal verb.</p>
                                <div class="space-y-3 text-sm text-gray-700 leading-relaxed font-medium">
                                    <p>1 I have never succeeded in <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">working out</span> which colors suit me best.</p>
                                    <p>2 The designer <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">pointed out</span> that the pattern on the fabric was unique.</p>
                                    <p>3 Unfortunately, I couldn't <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">come up with</span> any useful suggestions.</p>
                                    <p>4 James has managed to <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">narrow down</span> his choice of subjects to three.</p>
                                    <p>5 We chose the furniture, but when it <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">came to</span> the colors, we were undecided.</p>
                                    <p>6 I'm going to <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">carry out</span> a small study as part of my course book.</p>
                                    <p>7 It <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">turned out</span> that many workers preferred the colored chairs.</p>
                                    <p>8 The meeting had to be cancelled because too few people <span class="blank-dots text-gray-400">..............................</span><span class="blank-ans text-emerald-600 font-bold bg-emerald-50 px-2 rounded border border-emerald-200">turned up</span> .</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="ans-sb-read-u2" class="hidden mb-4 bg-slate-50 border border-rose-200 rounded-2xl p-6 shrink-0 shadow-sm transition-all fade-in">
                        <h4 class="font-bold text-rose-800 mb-4 flex items-center gap-2 border-b border-rose-100 pb-2 uppercase tracking-wide text-xs">
                            Answer Key
                        </h4>
                        <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3 text-sm text-gray-700 font-medium">
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm"><span class="text-rose-500 font-bold mr-2">1</span> iv</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm"><span class="text-rose-500 font-bold mr-2">2</span> i</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm"><span class="text-rose-500 font-bold mr-2">3</span> iii</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm"><span class="text-rose-500 font-bold mr-2">4</span> vii</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">5</span> training trials</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">6</span> (pre-nominal) position</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">7</span> features/cues</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">8</span> meaning/concept</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">9</span> unhelpful</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">10-11</span> A, C</div>
                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm md:col-span-2"><span class="text-rose-500 font-bold mr-2">12-13</span> C, D</div>
                        </div>
                    </div>

                    <div class="w-full flex-grow rounded-2xl overflow-hidden border border-gray-200 shadow-inner bg-gray-50 relative">
                        <iframe src="https://ieltschantruong.github.io/IELTS/learning_resources/reading/mock_test/passage3_complete_ielts_6.5_7.5_sb_unit2.html" class="absolute inset-0 w-full h-full border-0" title="Reading Practice"></iframe>
                    </div>
                </div>
            `
        }
    ];

    let currentIndex = 0;

    const headerEl = document.getElementById('app-header');
    const titleEl = document.getElementById('slide-title');
    const containerEl = document.getElementById('content-container');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const indicatorEl = document.getElementById('step-indicator');
    const progressBarEl = document.getElementById('progress-bar');
    const navDropdown = document.getElementById('nav-dropdown');
    const navMenuList = document.getElementById('nav-menu-list');

    window.addEventListener('DOMContentLoaded', () => {
        populateNavMenu();
        
        // Toggle menu
        document.getElementById('nav-toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            navDropdown.classList.toggle('hidden');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
                navDropdown.classList.add('hidden');
            }
        });

        // Navigation handlers
        if(prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) renderSlide(--currentIndex);
            });
        }

        if(nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentIndex < sessionData.length - 1) {
                    renderSlide(++currentIndex);
                } else {
                    showCompletionModal();
                }
            });
        }

        renderSlide(0);
    });

    function populateNavMenu() {
        if(!navMenuList) return;
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-white shadow-sm ${data.themeClass || ''}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title ? data.title.substring(3) : 'Section ' + (index + 1)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor || ''}">${data.type || 'Lesson'}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        if(navDropdown) navDropdown.classList.add('hidden');
    };

    function renderSlide(index) {
        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        // Update header classes and content dynamically based on section theme
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        // Highlight Nav menu
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-gray-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-gray-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        // Inject content
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
        }, 10);

        // Update buttons
        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };

    window.toggleInlineAnswers = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            container.classList.toggle('show-answers');
            
            // Highlight the container slightly when answers are shown
            if(container.classList.contains('show-answers')) {
                container.classList.add('shadow-md', 'border-emerald-300');
                container.classList.remove('shadow-sm', 'border-rose-100');
            } else {
                container.classList.remove('shadow-md', 'border-emerald-300');
                container.classList.add('shadow-sm', 'border-rose-100');
            }

            // Update button text and style
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answers' : 'Show Answers';
                btn.classList.toggle('bg-white');
                btn.classList.toggle('bg-emerald-100');
                btn.classList.toggle('text-rose-700');
                btn.classList.toggle('text-emerald-800');
            }
        }
    };

    function showCompletionModal() {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm fade-in';
        modal.innerHTML = `
            <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm mx-4 transform transition-all">
                <div class="w-20 h-20 bg-gradient-to-tr from-green-400 to-emerald-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Lesson Completed!</h3>
                <p class="text-gray-500 mb-8 font-medium">Excellent work today on Lesson 05. All sections have been covered.</p>
                <button onclick="this.parentElement.parentElement.remove()" class="w-full bg-gray-900 text-white font-bold py-3.5 rounded-xl hover:bg-gray-800 shadow-md hover:shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2">Return to Lesson</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
</script>
</body>
</html>
