<!DOCTYPE html>
<html lang="en">

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }

        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

        },
        {

                {q: "Do people use more electricity now than before?", a: "Undoubtedly. Our modern lives are completely dependent on an ever-growing array of electronic devices. The rise of cloud computing and smart grid technologies means energy consumption is at an all-time high."}
            ], `
                <div class="vocab-grid text-sm">
                    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                        <h5 class="font-bold text-gray-700 mb-2 border-b pb-1">Environmental & Technology</h5>
                        <ul class="space-y-2">
                            <li>🌍 <span class="font-semibold text-orange-700">Impact:</span> Carbon emissions, fossil fuels, clean energy, environmental impact</li>

                        <h5 class="font-bold text-gray-700 mb-2 border-b pb-1">Developing Ideas</h5>

        },
        {

            type: 'assessment',
            themeColor: 'bg-teal-600',
            title: 'Session Wrap-up & Assessment',
            content: `

                                    I attempted to use some of the new vocabulary discussed today.
                                </label>
                                <label class="flex items-start gap-3 text-gray-700 cursor-pointer hover:text-teal-700">
                                    <input type="checkbox" class="mt-1 w-4 h-4 text-teal-600 rounded focus:ring-teal-500">
                                    I was able to paraphrase when I didn't know the exact word.
                                </label>

                        <!-- Grammar -->
                        <div class="bg-teal-50 border border-teal-100 rounded-xl p-5">
                            <h4 class="font-bold text-teal-800 text-lg flex items-center gap-2 mb-3">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                Grammatical Range & Pronunciation
                            </h4>
                            <div class="space-y-2">
                                <label class="flex items-start gap-3 text-gray-700 cursor-pointer hover:text-teal-700">
                                    <input type="checkbox" class="mt-1 w-4 h-4 text-teal-600 rounded focus:ring-teal-500">
                                    I used a mix of simple and complex sentence structures.
                                </label>
                                <label class="flex items-start gap-3 text-gray-700 cursor-pointer hover:text-teal-700">
                                    <input type="checkbox" class="mt-1 w-4 h-4 text-teal-600 rounded focus:ring-teal-500">
                                    My speech was generally clear and easy to understand.

                    <div class="mt-8 text-center">
                        <button onclick="alert('Great job today! See you next session.')" class="bg-teal-600 text-white px-8 py-3 rounded-full font-bold hover:bg-teal-700 shadow-md transition-all transform hover:scale-105">
                            Complete Session
                        </button>
                    </div>
                </div>
            `
        }
    ];

    // Helper to generate Speaking Part 1 & 3 UI templates
    function generateSpeakingSlide(topicName, qnaList, hintHTML) {
        const questionList = qnaList.map((item, idx) => `
            <div class="p-5 rounded-xl bg-gray-50 border border-gray-100 mb-5 shadow-sm">
                <div class="flex items-start gap-3 mb-3">
                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold flex-shrink-0 mt-0.5">${idx + 1}</div>
                    <p class="text-lg text-gray-800 font-bold leading-snug">${item.q}</p>
                </div>
                <div class="pl-11">
                    <div class="bg-white border-l-4 border-emerald-400 p-4 rounded-r-lg shadow-sm">
                        <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-2 block flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Sample Answer
                        </span>
                        <p class="text-gray-700 italic">${item.a}</p>
                    </div>
                </div>
            </div>
        `).join('');

        return `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Topic: ${topicName}</h3>
                
                <div class="mb-8">
                    ${questionList}
                </div>

                <div class="pt-6 border-t border-gray-100">
                    <h4 class="font-bold text-gray-800 mb-4 flex items-center gap-2 text-lg">
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Suggested Ideas & Vocabulary
                    </h4>
                    <div class="bg-gray-50 border border-gray-200 rounded-xl p-6">
                        ${hintHTML}
                    </div>
                </div>
            </div>
        `;
    }

    // --- APPLICATION LOGIC ---
    let currentIndex = 0;
    
    // Timer states
    let timers = {
        listening: { interval: null, remaining: 2400, isRunning: false },
        prep: { interval: null, remaining: 60, isRunning: false },
        speak: { interval: null, remaining: 120, isRunning: false }
    };

    const headerEl = document.getElementById('app-header');
    const titleEl = document.getElementById('slide-title');
    const containerEl = document.getElementById('content-container');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const indicatorEl = document.getElementById('step-indicator');
    const progressBarEl = document.getElementById('progress-bar');

    // Navigation menu elements
    const navToggleBtn = document.getElementById('nav-toggle-btn');
    const navDropdown = document.getElementById('nav-dropdown');
    const navMenuList = document.getElementById('nav-menu-list');

    function populateNavMenu() {
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left px-4 py-3 hover:bg-gray-50 border-b border-gray-50 last:border-0 transition-colors flex items-start gap-3 border-l-4 border-l-transparent">
                <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-bold text-white mt-0.5 ${data.themeColor}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-semibold text-gray-800">${data.title}</div>
                    <div class="text-xs text-gray-500 capitalize">${data.type.replace(/\d/g, '').replace('_', ' ')}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        navDropdown.classList.add('hidden');
    };

    // Toggle menu
    navToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navDropdown.classList.toggle('hidden');
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (!navDropdown.contains(e.target) && !navToggleBtn.contains(e.target)) {
            navDropdown.classList.add('hidden');
        }
    });

    function renderSlide(index) {
        // Pause active timers when switching slides to prevent UI sync issues
        pauseAllTimers();

        const data = sessionData[index];
        
        // Update header classes and content
        headerEl.className = `text-white p-4 shadow-md transition-colors duration-500 z-10 ${data.themeColor}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        progressBarEl.style.width = `${progressPercent}%`;
        indicatorEl.textContent = `Step ${index + 1} of ${sessionData.length}`;

        // Update nav menu active state
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-blue-50', 'border-l-blue-500');
                btn.classList.remove('border-l-transparent');
            } else {
                btn.classList.remove('bg-blue-50', 'border-l-blue-500');
                btn.classList.add('border-l-transparent');
            }
        });

        // Inject content (force reflow to trigger animation)
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
            
            // Restore timer UI if they are on the current slide
            if(data.id === 'listening') updateTimerUI('listening', timers.listening.remaining);
            if(data.id === 'speaking_2_electricity') {
                updateTimerUI('prep', timers.prep.remaining);
                updateTimerUI('speak', timers.speak.remaining);
            }
        }, 10);

        // Update buttons
        prevBtn.disabled = index === 0;
        nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    // Navigation handlers
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            renderSlide(currentIndex);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < sessionData.length - 1) {
            currentIndex++;
            renderSlide(currentIndex);
        }
    });

    // Utilities callable from injected HTML
    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                // Automatically scroll down to show the newly opened content
                setTimeout(() => {
                    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };

    // --- TIMER LOGIC ---
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimerUI(id, seconds) {
        const displayEl = document.getElementById(`${id}-timer`);
        if (displayEl) displayEl.textContent = formatTime(seconds);
    }

    function toggleTimer(id, defaultTime) {
        const timer = timers[id];
        const btn = document.getElementById(`btn-${id}-timer`);
        
        if (timer.isRunning) {
            // Pause
            clearInterval(timer.interval);
            timer.isRunning = false;
            if(btn) btn.textContent = 'Resume';
        } else {
            // Start
            if (timer.remaining <= 0) timer.remaining = defaultTime; // Auto-reset if at 0
            
            timer.isRunning = true;
            if(btn) btn.textContent = 'Pause';
            
            timer.interval = setInterval(() => {
                timer.remaining--;
                updateTimerUI(id, timer.remaining);
                
                if (timer.remaining <= 0) {
                    clearInterval(timer.interval);
                    timer.isRunning = false;
                    if(btn) btn.textContent = 'Time Up!';
                    playAlertSound();
                }
            }, 1000);
        }
    }

    function resetTimer(id, defaultTime) {
        const timer = timers[id];
        clearInterval(timer.interval);
        timer.isRunning = false;
        timer.remaining = defaultTime;
        updateTimerUI(id, defaultTime);
        
        const btn = document.getElementById(`btn-${id}-timer`);
        if(btn) btn.textContent = 'Start';
    }

    function pauseAllTimers() {
        Object.keys(timers).forEach(key => {
            if (timers[key].isRunning) {
                clearInterval(timers[key].interval);
                timers[key].isRunning = false;
            }
        });
    }

    function playAlertSound() {
        // Double beep using Web Audio API for a clear alert when timer finishes
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playBeep = (startTime) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, startTime);
                gain.gain.setValueAtTime(0.1, startTime);
                osc.start(startTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, startTime + 0.3);
                osc.stop(startTime + 0.3);
            };
            
            // Trigger two beeps slightly spaced apart
            playBeep(ctx.currentTime);
            playBeep(ctx.currentTime + 0.4);
        } catch(e) { console.log('Audio alert fallback'); }
    }

    // Initialize application
    window.addEventListener('DOMContentLoaded', () => {
        populateNavMenu();
        renderSlide(0);
    });

</script>
