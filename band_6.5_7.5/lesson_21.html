        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    window.toggleInlineAnswers = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            container.classList.toggle('show-answers');
            if(container.classList.contains('show-answers')) {
                container.classList.add('bg-emerald-50/30');
                container.classList.add('border-emerald-200');
            } else {
                container.classList.remove('bg-emerald-50/30');
                container.classList.remove('border-emerald-200');
            }
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answers' : 'Show Answers';
                btn.classList.toggle('bg-white');
                btn.classList.toggle('bg-emerald-100');
                btn.classList.toggle('text-gray-700');
                btn.classList.toggle('text-emerald-800');
                btn.classList.toggle('border-gray-300');
                btn.classList.toggle('border-emerald-300');
            }
        }
    }

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };
</script>
</body>
</html>
