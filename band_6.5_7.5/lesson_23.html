        return `${m}:${s}`;
    }

        const timer = timers[id];
        const btn = document.getElementById(`btn-${id}-timer`);

            clearInterval(timer.interval);
            timer.isRunning = false;
            if(btn) btn.textContent = 'Resume';
        } else {
            if (timer.remaining <= 0) timer.remaining = defaultTime;
            
            timer.isRunning = true;
            if(btn) btn.textContent = 'Pause';
            
            timer.interval = setInterval(() => {
                timer.remaining--;
                updateTimerUI(id, timer.remaining);

                    timer.isRunning = false;
                    if(btn) btn.textContent = 'Time Up!';

                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);

                        };

                        playBeep(ctx.currentTime + 0.4);
                    } catch(e) {}
                }
            }, 1000);
        }

                                <div id="p2-s2-sample" class="hidden mt-4 bg-white p-4 rounded-xl border border-cyan-100 shadow-sm">
                                    <p class="text-sm text-gray-700 italic leading-relaxed">"I'm going to describe a beach in a coastal town that I visited last summer. I had heard it was a pristine tourist destination, but upon arrival, I was deeply disappointed by the severe pollution. The main issue was plastic waste; the shoreline was heavily <strong>littered</strong> with discarded plastic bags, bottles, and food wrappers. Moreover, the water looked murky and had a slight chemical odor, indicating water pollution, possibly from nearby unregulated factories or <strong>untreated sewage</strong>. This pollution has drastically affected the area. Not only has it ruined the natural beauty and deterred tourists, which hurts the local economy, but it also poses a massive threat to the marine ecosystem. It was a stark reminder of the <strong>devastating impact</strong> of human negligence on the environment."</p>

                                    <p class="font-bold text-gray-800 mb-3">${item.q}</p>
                                    <button onclick="toggleVisibility('tech-q${idx}')" class="self-start text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-200 transition-colors mb-3">Show Ideas & Vocab</button>
                                    <div id="tech-q${idx}" class="hidden flex-grow flex flex-col pt-3 border-t border-gray-200">
                                        <div class="mb-3">

                                            <ul class="list-disc list-inside text-sm text-gray-700 space-y-1">
                                                ${item.ideas.map(idea => `<li>${idea}</li>`).join('')}

                                            <div class="flex flex-wrap gap-1.5">
                                                ${item.vocab.map(v => `<span class="bg-white border border-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-medium">${v}</span>`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Topic: MEDIA & NEWS -->
                    <div>
                        <div class="flex items-center gap-3 mb-6 border-t border-gray-100 pt-8">
                            <div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-purple-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15M9 11l3 3L22 4"></path></svg>
                            </div>
                            <h4 class="text-2xl font-bold text-purple-800">MEDIA & NEWS</h4>
                        </div>
                        
                        <div class="grid md:grid-cols-2 gap-5">
                            ${[
                                {
                                    q: "1. Do you believe everything you read in the newspapers?",
                                    ideas: ["Different newspapers have different biases", "Human errors occur", "Cross-check information", "Trust reputable sources"],
                                    vocab: ["media bias", "fact-check", "verify information", "reputable source", "objective reporting", "sensational headlines"]
                                },
                                {
                                    q: "2. How do most people get their news in your country?",
                                    ideas: ["Social media", "News apps", "Online newspapers", "TV for older generations"],
                                    vocab: ["digital platforms", "real-time updates", "online news outlets", "instant access", "traditional media", "personalised news feed"]
                                },
                                {
                                    q: "3. How do you think people will get their news in the future?",
                                    ideas: ["AI-curated news", "Voice assistants", "Smart devices", "Short-form videos", "More personalised content"],
                                    vocab: ["AI-driven recommendations", "algorithm-based content", "personalised news feed", "digital literacy", "immersive media"]
                                },
                                {
                                    q: "4. How has TV changed our lives?",
                                    ideas: ["Easier access to information", "Better entertainment", "Greater cultural awareness", "More sedentary lifestyle", "Less family interaction"],
                                    vocab: ["broaden people's horizons", "raise public awareness", "sedentary lifestyle", "cultural exposure", "mass communication", "household entertainment"]
                                },
                                {
                                    q: "5. Do you think TV influences the way we think?",
                                    ideas: ["Shapes public opinion", "Influences purchasing decisions", "Promotes social values", "Depends on viewers' critical thinking"],
                                    vocab: ["shape public opinion", "influence consumer behaviour", "sway people's opinions", "cultural norms", "media influence", "think critically"]
                                },
                                {
                                    q: "6. Should children be allowed to watch a lot of TV?",
                                    ideas: ["Educational programmes are beneficial", "Excessive viewing affects health", "Reduces physical activity", "Parents should set limits"],
                                    vocab: ["excessive screen time", "parental supervision", "educational content", "cognitive development", "healthy balance", "attention span"]
                                },
                                {
                                    q: "7. Are all people on TV famous?",
                                    ideas: ["Experts", "Journalists", "Contestants", "Ordinary people", "Some become famous after appearing on TV"],
                                    vocab: ["public figures", "media personalities", "subject-matter experts", "gain public recognition", "media exposure", "household names"]
                                },
                                {
                                    q: "8. Do you think famous people have a responsibility to act as role models?",
                                    ideas: ["Young people imitate celebrities", "They should promote positive values", "Parents remain the biggest influence", "Celebrities are not perfect"],
                                    vocab: ["role model", "set a positive example", "social responsibility", "influence impressionable audiences", "moral obligation", "positive influence"]
                                }
                            ].map((item, idx) => `
                                <div class="bg-gray-50 border border-gray-200 rounded-xl p-5 shadow-sm flex flex-col">
                                    <p class="font-bold text-gray-800 mb-3">${item.q}</p>
                                    <button onclick="toggleVisibility('media-q${idx}')" class="self-start text-xs bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg font-bold hover:bg-purple-200 transition-colors mb-3">Show Ideas & Vocab</button>
                                    <div id="media-q${idx}" class="hidden flex-grow flex flex-col pt-3 border-t border-gray-200">
                                        <div class="mb-3">
                                            <p class="text-[10px] font-bold text-purple-600 uppercase tracking-wider mb-1.5">Suggested Ideas</p>
                                            <ul class="list-disc list-inside text-sm text-gray-700 space-y-1">
                                                ${item.ideas.map(idea => `<li>${idea}</li>`).join('')}
                                            </ul>
                                        </div>
                                        <div class="mt-auto">
                                            <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider mb-1.5">Advanced Vocabulary</p>
                                            <div class="flex flex-wrap gap-1.5">
                                                ${item.vocab.map(v => `<span class="bg-white border border-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-medium">${v}</span>`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

            `
        }
    ];

    let currentIndex = 0;

    const headerEl = document.getElementById('app-header');
    const titleEl = document.getElementById('slide-title');
    const containerEl = document.getElementById('content-container');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const indicatorEl = document.getElementById('step-indicator');
    const progressBarEl = document.getElementById('progress-bar');
    const navDropdown = document.getElementById('nav-dropdown');
    const navMenuList = document.getElementById('nav-menu-list');

    window.addEventListener('DOMContentLoaded', () => {
        populateNavMenu();
        
        // Toggle menu
        document.getElementById('nav-toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            navDropdown.classList.toggle('hidden');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
                navDropdown.classList.add('hidden');
            }
        });

        // Navigation handlers
        if(prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) renderSlide(--currentIndex);
            });
        }

        if(nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentIndex < sessionData.length - 1) {
                    renderSlide(++currentIndex);
                } else {
                    alert("Lesson 23 Completed! Excellent work today.");
                }
            });
        }

        renderSlide(0);
    });

    function populateNavMenu() {
        if(!navMenuList) return;
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-white shadow-sm ${data.themeClass || ''}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title ? data.title.substring(3) : 'Section ' + (index + 1)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor || ''}">${data.type || 'Lesson'}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        if(navDropdown) navDropdown.classList.add('hidden');
    };

    function renderSlide(index) {
        if (typeof pauseAllTimers === 'function') pauseAllTimers();
        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        // Update header classes and content dynamically based on section theme
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        // Highlight Nav menu
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-emerald-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-emerald-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        // Inject content
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
            
            // Restore timers visually if returning to slide
            if(data.id === 'speaking_unit7_1') {
                updateTimerUI('prep1', timers.prep1.remaining);
                updateTimerUI('speak1', timers.speak1.remaining);
            }
            if(data.id === 'speaking_unit7_2') {
                updateTimerUI('prep2', timers.prep2.remaining);
                updateTimerUI('speak2', timers.speak2.remaining);
            }
        }, 10);

        // Update buttons
        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };

    window.toggleInlineAnswers = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            container.classList.toggle('show-answers');
            
            // Highlight the container slightly when answers are shown
            if(container.classList.contains('show-answers')) {
                container.classList.add('shadow-md', 'border-emerald-300');
                container.classList.remove('shadow-sm', 'border-emerald-100');
            } else {
                container.classList.remove('shadow-md', 'border-emerald-300');
                container.classList.add('shadow-sm', 'border-emerald-100');
            }

            // Update button text and style
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answers' : 'Show Answers';
                btn.classList.toggle('bg-white');
                btn.classList.toggle('bg-emerald-100');
            }
        }
    };
</script>
