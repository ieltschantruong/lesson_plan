                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimerUI(id, seconds) {
        const displayEl = document.getElementById(`${id}-timer`);
        if (displayEl) displayEl.textContent = formatTime(seconds);
    }

    window.toggleTimer = function(id, defaultTime) {
        if(!timers[id]) {
            timers[id] = { interval: null, remaining: defaultTime, isRunning: false };
        }
        const timer = timers[id];
        const btn = document.getElementById(`btn-${id}-timer`);
        
        if (timer.isRunning) {
            clearInterval(timer.interval);
            timer.isRunning = false;
            if(btn) btn.textContent = 'Resume';
        } else {
            if (timer.remaining <= 0) timer.remaining = defaultTime;
            
            timer.isRunning = true;
            if(btn) btn.textContent = 'Pause';
            
            timer.interval = setInterval(() => {
                timer.remaining--;
                updateTimerUI(id, timer.remaining);
                
                if (timer.remaining <= 0) {
                    clearInterval(timer.interval);
                    timer.isRunning = false;
                    if(btn) btn.textContent = 'Time Up!';
                    playAlertSound();
                }
            }, 1000);
        }
    };

    window.resetTimer = function(id, defaultTime) {
        if(!timers[id]) return;
        const timer = timers[id];
        clearInterval(timer.interval);
        timer.isRunning = false;
        timer.remaining = defaultTime;
        updateTimerUI(id, defaultTime);
        const btn = document.getElementById(`btn-${id}-timer`);
        if(btn) btn.textContent = 'Start Timer';
    };

    function pauseAllTimers() {
        Object.keys(timers).forEach(key => {
            if (timers[key] && timers[key].isRunning) {
                clearInterval(timers[key].interval);
                timers[key].isRunning = false;
            }
        });
    }

    function playAlertSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playBeep = (startTime) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(850, startTime);
                gain.gain.setValueAtTime(0.15, startTime);
                osc.start(startTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, startTime + 0.4);
                osc.stop(startTime + 0.4);
            };
            playBeep(ctx.currentTime);
            playBeep(ctx.currentTime + 0.5);
        } catch(e) { console.log('Audio alert fallback'); }
    }
</script>
</body>
</html>
