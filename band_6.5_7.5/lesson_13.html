                                        <p id="p3-q1-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"I think artists are very important because they <span class="font-semibold text-purple-600">contribute to social progression</span>. Through their art, they can <span class="font-semibold text-purple-600">give thoughtful critique</span> to our society. Also, whether it's <span class="font-semibold text-purple-600">abstract</span> or <span class="font-semibold text-purple-600">life-like</span>, art provides communities with joy and inspiration."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">2</span> What should governments do to support the arts?</p>
                                        <button onclick="toggleVisibility('p3-q2-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q2-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"Governments should definitely help. They can build museums so more art is on <span class="font-semibold text-purple-600">display</span> for the public. Also, they should help with the <span class="font-semibold text-purple-600">upkeep</span> of these buildings and support artists financially so they can <span class="font-semibold text-purple-600">earn a living by</span> making art."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">3</span> How have styles of art changed over time?</p>
                                        <button onclick="toggleVisibility('p3-q3-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q3-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"In the past, artists used natural <span class="font-semibold text-purple-600">pigment</span> and painted on <span class="font-semibold text-purple-600">canvas</span>. But now, a key <span class="font-semibold text-purple-600">feature</span> of modern art is technology. People often use <span class="font-semibold text-purple-600">hand-held</span> devices or computers to create very <span class="font-semibold text-purple-600">eye-catching</span> digital art."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">4</span> What can you learn about a culture from its art?</p>
                                        <button onclick="toggleVisibility('p3-q4-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q4-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"We can learn a lot because art helps to <span class="font-semibold text-purple-600">record history</span>. By looking at ancient <span class="font-semibold text-purple-600">pottery</span> or paintings, we can find <span class="font-semibold text-purple-600">clues</span> about how people lived in the past and what kind of <span class="font-semibold text-purple-600">indigenous</span> materials they used."</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Category 2 -->
                            <div class="bg-purple-50 rounded-xl p-5 border border-purple-100 shadow-sm flex flex-col">
                                <h5 class="font-bold text-purple-700 mb-4 text-lg">Art and archaeology</h5>
                                <div class="space-y-4 text-sm text-gray-700 flex-grow">
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">5</span> Where do archaeologists often find ancient art?</p>
                                        <button onclick="toggleVisibility('p3-q5-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q5-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"Archaeologists usually find ancient art in old ruins or tombs. Sometimes, these objects are <span class="font-semibold text-purple-600">tucked</span> away in deep caves that people used as <span class="font-semibold text-purple-600">shelter</span> thousands of years ago."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">6</span> What can archaeologists learn from ancient art objects?</p>
                                        <button onclick="toggleVisibility('p3-q6-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q6-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"They can understand what life was like back then. For example, by checking the <span class="font-semibold text-purple-600">texture</span> or the materials of a tool, they know if certain resources were <span class="font-semibold text-purple-600">plentiful</span> or rare in that area."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">7</span> How can governments protect ancient sites?</p>
                                        <button onclick="toggleVisibility('p3-q7-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q7-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"Governments need to spend money on the <span class="font-semibold text-purple-600">upkeep</span> of these historical places. They also need strict rules so that these ancient sites are not <span class="font-semibold text-purple-600">blemished</span> or destroyed by too many tourists."</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Category 3 -->
                            <div class="bg-purple-50 rounded-xl p-5 border border-purple-100 shadow-sm flex flex-col">
                                <h5 class="font-bold text-purple-700 mb-4 text-lg">Performance</h5>
                                <div class="space-y-4 text-sm text-gray-700 flex-grow">
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">8</span> Live vs. TV performance? Which do you prefer?</p>
                                        <button onclick="toggleVisibility('p3-q8-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q8-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"I definitely prefer live performances. Watching TV is easy, but when you are there in person, you can see the incredible <span class="font-semibold text-purple-600">detail</span> and the <span class="font-semibold text-purple-600">stunning</span> energy of the actors. The atmosphere is just different."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">9</span> Should the government financially promote traditional performance?</p>
                                        <button onclick="toggleVisibility('p3-q9-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q9-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"Yes, they should. These traditional performances <span class="font-semibold text-purple-600">date back</span> hundreds of years and help <span class="font-semibold text-purple-600">keep the culture alive</span>. Without financial support, many performers can't <span class="font-semibold text-purple-600">earn a living by</span> doing this, and the art might disappear."</p>
                                    </div>
                                    <div>
                                        <p class="flex gap-2 items-start mb-2"><span class="font-bold text-purple-400">10</span> Is learning drama or dancing helpful for children?</p>
                                        <button onclick="toggleVisibility('p3-q10-ans')" class="text-[10px] font-bold text-purple-600 bg-purple-100 hover:bg-purple-200 px-2 py-1 rounded transition-colors mb-2">Show Sample</button>
                                        <p id="p3-q10-ans" class="hidden text-gray-600 italic pl-3 border-l-2 border-purple-300">"Yes, it's very helpful. Learning drama or dance helps children become <span class="font-semibold text-purple-600">engrossed</span> in something creative. It's a great way for them to forget the <span class="font-semibold text-purple-600">stresses</span> of schoolwork and build their confidence."</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `
        }
    ];

    let currentIndex = 0;
    
    // Timer states
    let timers = {
        speak4: { interval: null, remaining: 900, isRunning: false }     // 15 mins
    };

    let headerEl, titleEl, containerEl, prevBtn, nextBtn, indicatorEl, progressBarEl, navDropdown, navMenuList;

    window.addEventListener('DOMContentLoaded', () => {
        headerEl = document.getElementById('app-header');
        titleEl = document.getElementById('slide-title');
        containerEl = document.getElementById('content-container');
        prevBtn = document.getElementById('btn-prev');
        nextBtn = document.getElementById('btn-next');
        indicatorEl = document.getElementById('step-indicator');
        progressBarEl = document.getElementById('progress-bar');
        navDropdown = document.getElementById('nav-dropdown');
        navMenuList = document.getElementById('nav-menu-list');

        populateNavMenu();
        
        // Toggle menu
        document.getElementById('nav-toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            navDropdown.classList.toggle('hidden');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
                navDropdown.classList.add('hidden');
            }
        });

        // Navigation handlers
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) renderSlide(--currentIndex);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < sessionData.length - 1) {
                renderSlide(++currentIndex);
            } else {
                alert("Lesson 13 Completed! Great job.");
            }
        });

        renderSlide(0);
    });

    function populateNavMenu() {
        if (!navMenuList) return;
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-white shadow-sm ${data.themeClass || ''}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title ? data.title.substring(3) : 'Section ' + (index + 1)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor || ''}">${data.type || 'Lesson'}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        if(navDropdown) navDropdown.classList.add('hidden');
    };

    function renderSlide(index) {
        pauseAllTimers();

        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        // Update header classes and content dynamically based on section theme
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        // Highlight Nav menu
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-rose-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-rose-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        // Inject content
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
            
            // Restore timers visually if returning to slide
            if(data.id === 'speaking_unit4') updateTimerUI('speak4', timers.speak4.remaining);
        }, 10);

        // Update buttons
        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    window.toggleInlineAnswers = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            container.classList.toggle('show-answers');
            if(container.classList.contains('show-answers')) {
                container.classList.add('bg-emerald-50/30');
                container.classList.add('border-emerald-200');
            } else {
                container.classList.remove('bg-emerald-50/30');
                container.classList.remove('border-emerald-200');
            }
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answers' : 'Show Answers';
                btn.classList.toggle('bg-white');
                btn.classList.toggle('bg-emerald-100');
                btn.classList.toggle('text-gray-700');
                btn.classList.toggle('text-emerald-800');
                btn.classList.toggle('border-gray-300');
                btn.classList.toggle('border-emerald-300');
            }
        }
    }

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimerUI(id, seconds) {
        const displayEl = document.getElementById(`${id}-timer`);
        if (displayEl) displayEl.textContent = formatTime(seconds);
    }

    window.toggleTimer = function(id, defaultTime) {
        const timer = timers[id];
        const btn = document.getElementById(`btn-${id}-timer`);
        
        if (timer.isRunning) {
            clearInterval(timer.interval);
            timer.isRunning = false;
            if(btn) btn.textContent = 'Resume';
        } else {
            if (timer.remaining <= 0) timer.remaining = defaultTime;
            
            timer.isRunning = true;
            if(btn) btn.textContent = 'Pause';
            
            timer.interval = setInterval(() => {
                timer.remaining--;
                updateTimerUI(id, timer.remaining);
                
                if (timer.remaining <= 0) {
                    clearInterval(timer.interval);
                    timer.isRunning = false;
                    if(btn) btn.textContent = 'Time Up!';
                    playAlertSound();
                }
            }, 1000);
        }
    };

    window.resetTimer = function(id, defaultTime) {
        const timer = timers[id];
        clearInterval(timer.interval);
        timer.isRunning = false;
        timer.remaining = defaultTime;
        updateTimerUI(id, defaultTime);
        const btn = document.getElementById(`btn-${id}-timer`);
        if(btn) btn.textContent = 'Start Drill';
    };

    function pauseAllTimers() {
        Object.keys(timers).forEach(key => {
            if (timers[key].isRunning) {
                clearInterval(timers[key].interval);
                timers[key].isRunning = false;
            }
        });
    }

    function playAlertSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playBeep = (startTime) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(850, startTime);
                gain.gain.setValueAtTime(0.15, startTime);
                osc.start(startTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, startTime + 0.4);
                osc.stop(startTime + 0.4);
            };
            playBeep(ctx.currentTime);
            playBeep(ctx.currentTime + 0.5);
        } catch(e) { console.log('Audio alert fallback'); }
    }
</script>
