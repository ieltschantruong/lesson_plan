                                        <div class="w-32 shrink-0 font-bold"><span class="blank-dots text-gray-300">...................</span><span class="blank-ans text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200 shadow-sm">&nbsp;&nbsp;CORRECT&nbsp;&nbsp;</span></div>
                                    </div>
                                    <div class="flex flex-col md:flex-row justify-between md:items-center gap-2">
                                        <p><span class="font-bold text-gray-800">4</span> Go <span class="font-bold text-orange-500">on sale</span> means available to be bought.</p>
                                        <div class="shrink-0 font-bold text-right">
                                            <span class="blank-dots text-gray-300">...................</span>
                                            <span class="blank-ans text-rose-600 bg-rose-50 px-3 py-1 rounded-lg border border-rose-200 shadow-sm">INCORRECT</span>
                                            <p class="blank-ans text-[10px] text-gray-500 mt-1 block font-medium font-normal">("For sale" = available to buy. "On sale" = reduced price)</p>

                    <!-- Iframe Container -->
                    <div class="w-full flex-grow rounded-2xl overflow-hidden border border-gray-200 shadow-inner bg-gray-50 relative min-h-[500px]">
                        <iframe src="https://ieltschantruong.github.io/IELTS/learning_resources/reading/mock_test/passage1_complete_ielts_6.5_7.5_wb_unit4.html" class="absolute inset-0 w-full h-full border-0" title="Reading Practice"></iframe>
                    </div>
                </div>
            `
        },
        {
            id: 'speaking_arts_trail',
            type: 'Speaking',
            themeClass: 'bg-gradient-to-r from-amber-500 to-orange-600',
            iconColor: 'text-amber-500',
            title: '2. Speaking: The Arts Trail',
            content: `
                <div class="fade-in bg-white rounded-3xl shadow-xl border border-amber-50 p-6 md:p-10 relative overflow-hidden">
                    <div class="absolute -top-32 -right-32 w-80 h-80 bg-amber-100 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
                    
                    <div class="relative z-10">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 border-b border-gray-100 pb-6">
                            <div>
                                <span class="inline-block py-1 px-3 rounded-full bg-amber-100 text-amber-700 font-bold text-xs uppercase tracking-widest mb-2">Speaking Game</span>
                                <h3 class="text-3xl font-bold text-gray-800 mb-2">The Arts Trail</h3>
                                <p class="text-gray-500 font-medium">Use the board game provided in class. Roll the dice and answer the questions or fill in the blanks.</p>
                            </div>
                            
                            <div class="flex flex-col sm:flex-row gap-3">
                                <a href="https://canva.link/6non6l0kqd1bpe6" target="_blank" class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-purple-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold hover:from-purple-600 hover:to-indigo-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 text-sm" title="Open Game Board in new tab">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    Open Game Board
                                </a>
                                <a href="https://www.online-stopwatch.com/3d-dice" target="_blank" class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-red-500 to-red-600 text-white px-5 py-2.5 rounded-xl font-bold hover:from-red-600 hover:to-red-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 text-sm" title="Open 3D Dice Roller in new tab">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    Open 3D Dice
                                </a>
                                <button onclick="toggleVisibility('game-rules')" class="bg-amber-100 text-amber-800 px-5 py-2.5 rounded-xl font-bold hover:bg-amber-200 transition-colors shadow-sm text-sm">
                                    View Game Rules
                                </button>
                            </div>
                        </div>

                        <div id="game-rules" class="hidden mb-8 bg-amber-50 border border-amber-200 rounded-xl p-5 shadow-sm text-gray-700 text-sm">
                            <h4 class="font-bold text-amber-900 mb-3 flex items-center gap-2 text-base">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                How to Play
                            </h4>
                            <ul class="list-disc list-inside space-y-2 font-medium">
                                <li>Students take turns rolling the dice and moving their marker along the board.</li>
                                <li><strong class="text-amber-700">Question Squares:</strong> The student must provide a full, reasoned answer (similar to Speaking Part 3).</li>
                                <li><strong class="text-amber-700">Fill-in-the-blank Squares:</strong> The student must guess the missing vocabulary word.</li>
                                <li><strong class="text-amber-700">Action Squares:</strong> Follow the instructions (e.g., "Miss a turn", "Move forward two squares").</li>
                                <li>The teacher can use the toggles below to reveal sample answers and vocabulary keys.</li>
                            </ul>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${artsTrailHTML}
                        </div>
                    </div>
                </div>
            `
        }
    ];

    let currentIndex = 0;

    const headerEl = document.getElementById('app-header');
    const titleEl = document.getElementById('slide-title');
    const containerEl = document.getElementById('content-container');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const indicatorEl = document.getElementById('step-indicator');
    const progressBarEl = document.getElementById('progress-bar');
    const navDropdown = document.getElementById('nav-dropdown');
    const navMenuList = document.getElementById('nav-menu-list');

    window.addEventListener('DOMContentLoaded', () => {
        populateNavMenu();
        
        document.getElementById('nav-toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            navDropdown.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
                navDropdown.classList.add('hidden');
            }
        });

        if(prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) renderSlide(--currentIndex);
            });
        }

        if(nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentIndex < sessionData.length - 1) {
                    renderSlide(++currentIndex);
                } else {
                    alert("Lesson 14 Completed! Excellent work today.");
                }
            });
        }

        renderSlide(0);
    });

    function populateNavMenu() {
        if(!navMenuList) return;
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-white shadow-sm ${data.themeClass || ''}">
                    ${index + 1}
                </div>
                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title ? data.title.substring(3) : 'Section ' + (index + 1)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor || ''}">${data.type || 'Lesson'}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        if(navDropdown) navDropdown.classList.add('hidden');
    };

    function renderSlide(index) {
        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-orange-200', 'shadow-md');
                btn.classList.remove('border-transparent', 'shadow-sm');
            } else {
                btn.classList.remove('bg-white', 'border-orange-200', 'shadow-md');
                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
        }, 10);

        if(prevBtn) prevBtn.disabled = index === 0;
        if(nextBtn) nextBtn.innerHTML = index === sessionData.length - 1 ? 
            'Finish Lesson <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : 
            'Next Section <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
    }

    window.toggleInlineAnswers = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            container.classList.toggle('show-answers');
            if(container.classList.contains('show-answers')) {
                container.classList.add('shadow-md', 'border-emerald-300');
            } else {
                container.classList.remove('shadow-md', 'border-emerald-300');
            }
            if(btn) {
                btn.textContent = container.classList.contains('show-answers') ? 'Hide Answer' : 'Show Answer';
                btn.classList.toggle('bg-white');
                btn.classList.toggle('bg-emerald-100');
                btn.classList.toggle('text-gray-700');
                btn.classList.toggle('text-emerald-800');
            }
        }
    }

    window.toggleGameAnswer = function(containerId, btnId) {
        const container = document.getElementById(containerId);
        const btn = document.getElementById(btnId);
        if(container) {
            if(container.classList.contains('hidden')){
                container.classList.remove('hidden');
                container.classList.add('fade-in');
                if(btn) {
                    btn.textContent = 'Hide Answer';
                    btn.classList.remove('bg-white', 'text-gray-700');
                    btn.classList.add('bg-gray-800', 'text-white');
                }
            } else {
                container.classList.add('hidden');
                container.classList.remove('fade-in');
                if(btn) {
                    btn.textContent = 'Show Answer';
                    btn.classList.add('bg-white', 'text-gray-700');
                    btn.classList.remove('bg-gray-800', 'text-white');
                }
            }
        }
    }

    window.toggleVisibility = function(id) {
        const el = document.getElementById(id);
        if(el) {
            if(el.classList.contains('hidden')){
                el.classList.remove('hidden');
                el.classList.add('fade-in');
                setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
            } else {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        }
    };
</script>
