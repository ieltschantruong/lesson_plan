    // --- TIMER LOGIC ---
    let timers = {};

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimerUI(id, seconds) {
        const displayEl = document.getElementById(`${id}-timer`);
        if (displayEl) displayEl.textContent = formatTime(seconds);
    }

    window.toggleTimer = function(id, defaultTime) {
        if(!timers[id]) timers[id] = { interval: null, remaining: defaultTime, isRunning: false };
        const timer = timers[id];
        const btn = document.getElementById(`btn-${id}-timer`);
        
        if (timer.isRunning) {
            clearInterval(timer.interval);
            timer.isRunning = false;
            if(btn) btn.textContent = 'Resume';
        } else {
            if (timer.remaining <= 0) timer.remaining = defaultTime;
            timer.isRunning = true;
            if(btn) btn.textContent = 'Pause';
            
            timer.interval = setInterval(() => {
                timer.remaining--;
                updateTimerUI(id, timer.remaining);
                
                if (timer.remaining <= 0) {
                    clearInterval(timer.interval);
                    timer.isRunning = false;
                    if(btn) btn.textContent = 'Time Up!';
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const playBeep = (st) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.frequency.setValueAtTime(800, st);
                            gain.gain.setValueAtTime(0.1, st);
                            osc.start(st);
                            gain.gain.exponentialRampToValueAtTime(0.00001, st + 0.3);
                            osc.stop(st + 0.3);
                        };
                        playBeep(ctx.currentTime);
                        playBeep(ctx.currentTime + 0.4);
                    } catch(e) {}
                }
            }, 1000);
        }
    };

    window.resetTimer = function(id, defaultTime) {
        if(!timers[id]) return;
        const timer = timers[id];
        clearInterval(timer.interval);
        timer.isRunning = false;
        timer.remaining = defaultTime;
        updateTimerUI(id, defaultTime);
        const btn = document.getElementById(`btn-${id}-timer`);
        if(btn) btn.textContent = 'Start';
    };

        Object.keys(timers).forEach(key => {

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navDropdown.contains(e.target) && !document.getElementById('nav-toggle-btn').contains(e.target)) {
                navDropdown.classList.add('hidden');
            }
        });

        // Navigation handlers
        if(prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) renderSlide(--currentIndex);
            });
        }

        if(nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentIndex < sessionData.length - 1) {
                    renderSlide(++currentIndex);

                }
            });
        }

        renderSlide(0);

    function populateNavMenu() {
        if(!navMenuList) return;
        navMenuList.innerHTML = sessionData.map((data, index) => `
            <button onclick="goToSlide(${index})" class="nav-item-btn w-full text-left p-3 mb-1 rounded-xl hover:bg-white transition-all flex items-center gap-3 border border-transparent shadow-sm">

                <div>
                    <div class="text-sm font-bold text-gray-800 leading-tight">${data.title ? data.title.substring(3) : 'Section ' + (index + 1)}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${data.iconColor || ''}">${data.type || 'Lesson'}</div>
                </div>
            </button>
        `).join('');
    }

    window.goToSlide = function(index) {
        currentIndex = index;
        renderSlide(currentIndex);
        if(navDropdown) navDropdown.classList.add('hidden');
    };

    function renderSlide(index) {
        if (typeof pauseAllTimers === 'function') pauseAllTimers();
        const data = sessionData[index];
        if(!headerEl || !titleEl || !containerEl) return;
        
        // Update header classes and content dynamically based on section theme
        headerEl.className = `text-white p-4 shadow-lg transition-colors duration-700 z-20 relative ${data.themeClass}`;
        titleEl.textContent = data.title;
        
        // Update progress
        const progressPercent = ((index + 1) / sessionData.length) * 100;
        if(progressBarEl) progressBarEl.style.width = `${progressPercent}%`;
        if(indicatorEl) indicatorEl.textContent = `Section ${index + 1} of ${sessionData.length}`;

        // Highlight Nav menu
        document.querySelectorAll('.nav-item-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('bg-white', 'border-gray-200', 'shadow-md');

                btn.classList.add('border-transparent', 'shadow-sm');
            }
        });

        // Inject content
        containerEl.innerHTML = ''; 
        setTimeout(() => {
            containerEl.innerHTML = data.content;
        }, 10);
